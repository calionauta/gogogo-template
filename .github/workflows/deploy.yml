# deploy.yml — production deploy to the user's own server
# (calionauta/fullstack.example.com via Tailscale).
#
# Trigger: every push to master. The workflow:
#   1. Builds the project (lint + test + race + CSS build)
#   2. Builds the production Docker image (linux/amd64 scratch)
#   3. Brings up Tailscale in the GH runner (OAuth, scoped to this run)
#   4. SCPs the binary + compose file to the server (via Tailscale)
#   5. SSHes in and runs scripts/deploy-prod.sh which:
#        - atomically swaps the binary
#        - writes the secrets file (mode 600) from GH Secrets
#        - restarts the container
#        - waits for /health
#
# Secrets are NEVER stored long-term on the server: every deploy
# re-renders the secrets file from GitHub Actions secrets, which
# are the single source of truth. The previous binary is kept as
# `gogogo-fullstack-template.previous` so an operator can roll back instantly.
#
# Required GitHub Actions secrets (Settings > Secrets > Actions):
#   Tailscale (OIDC workload identity federation — no static secret):
#     TS_OAUTH_CLIENT_ID   Federated identity Client ID (from
#                          https://login.tailscale.com/admin/settings/identity)
#     TS_AUDIENCE          Federated identity Audience
#   SSH to the server:
#     DEPLOY_HOST           Tailscale hostname of the server
#                           (e.g. server.example.com or 100.x.x.x Tailscale IP)
#     DEPLOY_USER           the deploy user (e.g. 'deploy')
#     DEPLOY_SSH_KEY        private SSH key (PEM, the user only)
#   Demo runtime:
#     GOAI_API_KEY          Groq / OpenAI / OpenRouter key
#     ADMIN_UNLOCK_TOKEN    master password for the custom admin panel
#                           (set empty to disable the panel)
#
# The deploy job never echoes secrets. The .env file is written
# with mode 0600 and owned by the deploy user; the container
# reads it via env_file.

name: Deploy to production

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never run two deploys in parallel: the binary swap + container
# restart is racy. The cancel-in-progress=false keeps the first
# deploy running until completion.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Build + test on linux/amd64
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Generate CSS
        run: npm run build

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build prod binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
              -tags "jetstream turbine" \
              -trimpath -ldflags="-s -w" \
              -o bin/gogogo-fullstack-template.new ./cmd/web/

      - name: Stash binary
        uses: actions/upload-artifact@v4
        with:
          name: gogogo-fullstack-template-linux-amd64
          path: bin/gogogo-fullstack-template.new

  # ─────────────────────────────────────────────
  # 2. Deploy via Tailscale SSH
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only on master push or manual dispatch (not on PRs).
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    # Required for the Tailscale OIDC federated identity — the
    # runner needs to mint a JWT for the Tailscale IdP to verify.
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Bring up Tailscale in the runner
        # Uses OIDC Workload Identity Federation — the runner
        # authenticates to Tailscale with a short-lived JWT signed
        # by GitHub Actions. No static secret. Recommended by
        # Tailscale over OAuth clients.
        #
        # To set this up:
        #   1. Create a tag in your tailnet (e.g. `tag:continuous-integration`,
        #      which is the convention Tailscale's docs use) and
        #      grant it the access permissions the CI runner needs
        #      (e.g. SSH to the deploy user on the server).
        #   2. Create a federated identity at
        #      https://login.tailscale.com/admin/settings/identity
        #      (issuer: GitHub, audience: anything memorable, e.g.
        #      `ts-actions-deploy`). You'll get a Client ID and an
        #      Audience.
        #   3. Add the Client ID as TS_OAUTH_CLIENT_ID and the
        #      Audience as TS_AUDIENCE in GH Secrets.
        #   4. The `id-token: write` permission above is mandatory.
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:continuous-integration
          args: --ssh


      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: gogogo-fullstack-template-linux-amd64
          path: dist/

      # Write the secrets file with mode 600 BEFORE any container
      # could read it. The secrets are sourced from GitHub Secrets;
      # the file is regenerated on every deploy and is never
      # committed to the repo.
      - name: Write secrets file (mode 600)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GOAI_API_KEY: ${{ secrets.GOAI_API_KEY }}
          ADMIN_UNLOCK_TOKEN: ${{ secrets.ADMIN_UNLOCK_TOKEN }}
        run: |
          set -euo pipefail
          # Tailscale SSH (port 2222) on this server is in userspace
          # mode: it accepts the same authorized_keys as local sshd
          # but routes via the Tailscale tunnel (so we don't need
          # the public IP / port 22 to be reachable). The matching
          # public key was added to ~/.ssh/authorized_keys on the
          # server (no 'command=' prefix this time — we want a real
          # shell, not the forced deploy-prod invocation that the
          # other repo uses).
          mkdir -p ~/.ssh && chmod 0700 ~/.ssh
          # echo appends a newline; OpenSSH keys end with one anyway.
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 0600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 -p 2222 $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<EOF
          Host $DEPLOY_HOST
            Port 2222
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            IdentityFile ~/.ssh/deploy_key
            User $DEPLOY_USER
          EOF
          chmod 0600 ~/.ssh/config
          APP_NAME="gogogo-fullstack-template"
          SECRETS_DIR="/home/deploy/${APP_NAME}/secrets"
          ssh $DEPLOY_HOST "set -euo pipefail
            mkdir -p \"$SECRETS_DIR\"
            umask 077
            cat > \"$SECRETS_DIR/${APP_NAME}.env.tmp\" <<EOF2
          GOAI_API_KEY=$GOAI_API_KEY
          ADMIN_UNLOCK_TOKEN=$ADMIN_UNLOCK_TOKEN
          EOF2
            mv \"$SECRETS_DIR/${APP_NAME}.env.tmp\" \"$SECRETS_DIR/${APP_NAME}.env\"
            chmod 0600 \"$SECRETS_DIR/${APP_NAME}.env\"
            echo '✓ secrets file written (mode 600)'
          "

      # SCP the new binary to /home/deploy/gogogo-fullstack-template/bin/ as .new so
      # the on-server script can atomically swap it.
      - name: Copy binary to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          scp -P 2222 dist/gogogo-fullstack-template.new $DEPLOY_HOST:/home/deploy/gogogo-fullstack-template/bin/gogogo-fullstack-template.new

      # SCP the compose file (overwriting the previous one).
      - name: Copy compose file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          scp -P 2222 deploy/docker-compose.prod.yml $DEPLOY_HOST:/home/deploy/gogogo-fullstack-template/compose/docker-compose.prod.yml

      # Ensure the directory layout exists, pull the latest source so
      # the on-server script and the scripts dir are current, then run
      # the deploy. The on-server script does the atomic binary swap
      # + container restart + health-check wait.
      - name: Ensure layout + run deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          ssh $DEPLOY_HOST "set -euo pipefail
            APP_NAME=\"gogogo-fullstack-template\"
            APP_DIR=\"/home/deploy/\${APP_NAME}\"
            for d in bin compose env scripts secrets data/pb_data; do
             mkdir -p \"\${APP_DIR}/\${d}\"
           done

            if [ ! -d \"/home/deploy/gogogo-fullstack-template/repo\" ]; then
              git clone \"https://github.com/${{ github.repository }}.git\" \"/home/deploy/gogogo-fullstack-template/repo\"
            else
              git -C \"/home/deploy/gogogo-fullstack-template/repo\" pull --ff-only
            fi

            cp \"/home/deploy/gogogo-fullstack-template/repo/.env\" \"\${APP_DIR}/env/.env\" 2>/dev/null || true
            cp \"/home/deploy/gogogo-fullstack-template/repo/scripts/deploy-prod.sh\" \"\${APP_DIR}/scripts/deploy-prod.sh\"
            chmod 0700 \"\${APP_DIR}/scripts/deploy-prod.sh\"

            bash \"\${APP_DIR}/scripts/deploy-prod.sh\"
          "
