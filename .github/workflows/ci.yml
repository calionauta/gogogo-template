name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  ci:
    strategy:
      matrix:
        tag: ["", "jetstream", "turbine"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Generate templ
        run: go tool templ generate
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
      - name: Test
        run: go test -tags "${{ matrix.tag }}" ./... -v -count=1
      - name: Build
        run: go build -tags "${{ matrix.tag }}" -o /dev/null ./cmd/web/
