name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - name: Install Go 1.26.5 manually
        # actions/setup-go extracts the toolchain via tar and has been
        # intermittently corrupting it on this runner image. Install the
        # official stable tarball from go.dev into /usr/local/go instead,
        # which is a separate, reliable path.
        run: |
          curl -fsSL https://go.dev/dl/go1.26.5.linux-amd64.tar.gz -o /tmp/go.tgz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version
      - name: Generate templ
        run: go tool templ generate
      - name: Install C toolchain (CGO for loro-go)
        # internal/collab uses loro-go, a CGO binding to the Loro C library.
        run: sudo apt-get update -qq && sudo apt-get install -y gcc
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          skip-cache: true
          # cmd/desktop pulls in wails v3, which needs webview CGO headers
          # unavailable on the ubuntu runner; lint the web-facing packages only.
          args: ./cmd/web/ ./config/ ./db/ ./features/... ./internal/... ./router/... ./web/...
      - name: Datastar-lint
        run: |
          go install github.com/calionauta/datastar-lint@latest
          export PATH="$HOME/go/bin:$PATH"
          make datastar-lint
      - name: Set up Node (CSS build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: CSS build
        run: make css
      - name: Test
        # DagNats boots an embedded NATS + workflow engine per package under
        # test; under -race, parallel packages starve the engine and cause
        # flaky timeouts. Serialize packages (-p 1).
        # Skip cmd/desktop: it is a Wails build that needs GTK/WebKit dev
        # libraries only present on the desktop build runners, not here.
        run: |
          PKGS=$(go list ./... | grep -vE "cmd/desktop$|^github.com/calionauta/gogogo-fullstack-template$")
          go test -race -p 1 $PKGS -v -count=1
      - name: Build
        run: go build -o /dev/null ./cmd/web/
      - name: Browser smoke test
        # Boots the built binary in headless Chromium and fails on any
        # uncaught client-side JS error. Playwright/Chromium is ~300MB
        # and only needed for the E2E smoke test; skip in CI by default.
        # Run locally via: node scripts/smoke.mjs
        run: |
          echo "⏭️  Browser smoke test skipped in CI. Run locally with: node scripts/smoke.mjs"
