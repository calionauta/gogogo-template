name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  ci:
    strategy:
      matrix:
        tag: ["", "jetstream", "turbine"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Generate templ
        run: go tool templ generate
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          # The action's default GitHub cache has been intermittently
          # failing with a malformed tar restore ("/usr/bin/tar" exit 2),
          # which aborts the whole job on infra flake rather than lint
          # failure. Disable the cache so lint runs every time.
          skip-cache: true
      - name: Test
        run: go test -tags "${{ matrix.tag }}" ./... -v -count=1
      - name: Smoke (boot real binary)
        # Boots the compiled artifact, hits /health, asserts the rendered
        # page wires the SSE opener, and confirms the SSE transport opens.
        # Gated by RUN_SMOKE so local runs skip the port-binding server.
        env:
          RUN_SMOKE: "1"
        run: go test -tags "${{ matrix.tag }}" ./cmd/web/ -run TestSmoke -v -count=1 -timeout 180s
      - name: Build
        run: go build -tags "${{ matrix.tag }}" -o /dev/null ./cmd/web/
