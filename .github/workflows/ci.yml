name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
permissions:
  contents: read
jobs:
  ci:
    strategy:
      matrix:
        tag: ["", "jetstream", "dagnats", "jetstream dagnats"]
    runs-on: ubuntu-latest
    env:
      # Use the Go toolchain we install manually below (go1.26.5) and never
      # let `go` try to re-download a toolchain (the actions/setup-go
      # extraction has been observed corrupting the tar on this runner
      # image, which breaks `go` entirely).
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - name: Install Go 1.26.5 manually
        # actions/setup-go extracts the toolchain via tar and has been
        # intermittently corrupting it on this runner image. Install the
        # official stable tarball from go.dev into /usr/local/go instead,
        # which is a separate, reliable path.
        run: |
          curl -fsSL https://go.dev/dl/go1.26.5.linux-amd64.tar.gz -o /tmp/go.tgz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version
      - name: Generate templ
        run: go tool templ generate
      - name: Install C toolchain (CGO for loro-go)
        # internal/collab uses loro-go, a CGO binding to the Loro C library.
        # The jetstream matrix tags compile collab, so CGO must be enabled
        # and a C compiler must be present on the Linux runner.
        run: sudo apt-get update -qq && sudo apt-get install -y gcc
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          # The action's default GitHub cache has been intermittently
          # failing with a malformed tar restore ("/usr/bin/tar" exit 2),
          # which aborts the whole job on infra flake rather than lint
          # failure. Disable the cache so lint runs every time.
          skip-cache: true
      - name: Diagnose go test with tags
        run: |
          go version
          pwd
          echo "--- go list dagnats ---"
          go list -tags dagnats ./... 2>&1 | head -5
          echo "--- go test dagnats (verbose) ---"
          go test -tags dagnats ./... 2>&1 | head -10
      - name: Test
        # DagNats boots an embedded NATS + workflow engine per package under
        # test; under -race, parallel packages starve the engine and cause
        # flaky timeouts. Serialize packages (-p 1) for the dagnats tags.
        # The module root (`.`) has no Go files, and `go test ./...` under
        # some Go patch versions treats an empty root package as a hard
        # error ("no Go files"). List packages explicitly and drop the root
        # so the gate is robust across Go versions.
        run: |
          case "${{ matrix.tag }}" in
            "dagnats"|"jetstream dagnats") P=-p1 ;;
            *) P= ;;
          esac
          PKGS=$(go list ./... | grep -v "^github.com/calionauta/gogogo-fullstack-template$")
          go test -tags "${{ matrix.tag }}" $P $PKGS -v -count=1
      - name: Build
        run: go build -tags "${{ matrix.tag }}" -o /dev/null ./cmd/web/
