# .air.toml — Live reload for cali-go-stack.
#
# On every save, Air runs the `build` cycle. pre_cmd runs before the Go
# build (Templ codegen + Datastar linter). post_cmd runs AFTER a successful
# build and gives you immediate feedback on lint/vet/sizes/deadcode so you
# catch issues during development, not at commit time. This mirrors the
# granular `tool.after.bash` pattern from pi hooks yaml (see AGENTS.md).

[build]
  pre_cmd = [
    "lsof -ti:8080 | xargs kill -9 2>/dev/null || true",
    "go tool templ generate && bin/datastar-lint"
  ]
  cmd            = "go build -ldflags='-w -X main.Version=dev' -o ./tmp/app ./cmd/web"
  bin            = "./tmp/app"
  args_bin       = []
  include_ext    = ["go", "templ", "yaml"]
  exclude_dir    = ["tmp", "vendor", "node_modules"]
  exclude_regex  = ["_templ\\.go$"]
  kill_delay     = "500ms"
  send_interrupt = true
  poll           = true
  poll_interval  = 500
  stop_on_error  = true
  # Post-build feedback runs after a successful Go build. Failures are
  # printed but do NOT block the rebuild (so dev loop stays fast).
  # Run `make check` for the blocking full gate before committing.
  post_cmd = [
    "echo '━━━ post-build checks (info) ━━━'",
    "gofumpt -l . | head -20 | (read x && echo \"  ⚠ gofumpt: $x\" || echo '  ✓ gofumpt')",
    "go vet ./... >/tmp/air-vet.out 2>&1 && echo '  ✓ go vet' || echo '  ⚠ go vet (see /tmp/air-vet.out)'",
    "which golangci-lint >/dev/null 2>&1 && (golangci-lint run ./... >/tmp/air-lint.out 2>&1 && echo '  ✓ golangci-lint' || echo '  ⚠ golangci-lint (see /tmp/air-lint.out)') || echo '  ⚠ golangci-lint not installed'",
  ]

[log]
  time = true

[misc]
  clean_on_exit = true