# docker-compose.prod.yml — production deployment for gogogo-fullstack-template.
# Used by:
#   - GitHub Actions deploy workflow (via ssh-action on the server)
#   - The on-server script scripts/deploy-prod.sh
#
# Environment variables that are NOT secrets come from .env (committed).
# Secrets come from secrets/${APP_NAME}.env (mode 600, regenerated
# every deploy from GitHub Actions secrets — never committed).

name: gogogo-fullstack-template

services:
  gogogo-fullstack-template:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    image: gogogo-fullstack-template:prod
    container_name: gogogo-fullstack-template
    restart: unless-stopped
    user: "65532:65532"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Non-secret env (from .env) — defaults baked in but can be overridden
      # in the .env file.
      APP_NAME: ${APP_NAME:-gogogo-fullstack-template}
      APP_URL: ${APP_URL:-https://fullstack.example.com}
      HOST: 0.0.0.0
      PORT: "8080"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATA_DIR: /var/lib/gogogo-fullstack-template/data
      # LLM (these three lines are wired by the GH Action; the
      # production .env may also override).
      GOAI_BASE_URL: ${GOAI_BASE_URL:-https://api.openai.com/v1}
      GOAI_MODEL: ${GOAI_MODEL:-gpt-4o-mini}
      # Realtime + durable workflow — binary built with -tags "jetstream turbine".
      NATS_ENABLED: "true"
      NATS_STORE_DIR: /var/lib/${APP_NAME:-gogogo-fullstack-template}/data/nats
      WORKFLOW_ENABLED: "true"
      WORKFLOW_DATA_DIR: /var/lib/${APP_NAME:-gogogo-fullstack-template}/data/workflow
      WORKFLOW_EXECUTOR_ID: local
    env_file:
      - /home/deploy/gogogo-fullstack-template/secrets/gogogo-fullstack-template.env
    volumes:
      # Bind mount (not Docker volume) so operators can inspect/back up
      # the SQLite WAL files without docker exec (see scripts/db-tools/).
      #
      # Host source is /home/deploy/<APP_NAME>/data (NOT /var/lib): the
      # deploy user is non-root and cannot mkdir/chown under /var/lib, so
      # the deploy script creates + ACLs the dir under /home/deploy and
      # grants container uid 65532 write access. The container target
      # stays /var/lib/<APP_NAME>/data — that is what the app's DATA_DIR
      # env points at, so the in-container path is unchanged.
      - /home/deploy/${APP_NAME:-gogogo-fullstack-template}/data:/var/lib/${APP_NAME:-gogogo-fullstack-template}/data
      # Turbine durable-workflow state. The embedded PocketBase inside
      # turbine (-tags turbine) stores its data in /pb_data; mount the
      # host volume so workflow state survives container recreation.
      - /home/deploy/${APP_NAME:-gogogo-fullstack-template}/data/turbine:/pb_data
    healthcheck:
      # Exec form (no shell) — the image is scratch, so wget/curl and
      # CMD-SHELL are unavailable. `/app health` is a built-in
      # scratch-compatible subcommand that GETs /health internally.
      test: ["CMD", "/app", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
